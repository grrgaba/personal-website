<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ski Resort Trip Planner — nicodimaano.com</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .calculator { max-width:600px; margin:2rem auto; padding:1rem; }
    .calculator label { display:block; margin:0.5rem 0 0.25rem; }
    .calculator input { width:100%; padding:0.5rem; }
    .helper-text { margin:0.35rem 0 0; font-size:0.92rem; color:#666; }
    .result { margin-top:1rem; font-weight:600; }
    .arrow-wrap { text-align:center; margin:1.5rem 0; }
    .arrow-svg { width:120px; height:40px; display:inline-block; }
    .airport-input, .resort-input { font-size:1rem; }
    .input-row { display:flex; align-items:center; gap:2.5rem; justify-content:center; }
    .input-row .col { flex:1; max-width:44%; }
    .arrow-wrap { flex:0 0 180px; margin:0; }
    @media (max-width:640px) {
      .input-row { flex-direction:column; gap:1rem; }
      .input-row .col { max-width:100%; }
      .arrow-wrap { flex:0 0 auto; }
    }
    .calc-btn { display:block; width:100%; padding:0.85rem; margin-top:1rem; background:linear-gradient(90deg,#4facfe,#00f2fe); color:#fff; border:0; border-radius:6px; font-size:1.05rem; cursor:pointer; }

    /* Results box */
    .results-box { border:1px solid #e1e4e8; background:#fafafa; padding:0.75rem; margin-top:1rem; border-radius:6px; max-height:220px; overflow:auto; }
    .results-box ol { margin:0; padding-left:1.25rem; }
    .results-box li { padding:0.45rem 0; border-bottom:1px solid rgba(0,0,0,0.04); font-weight:600; }
    .results-box li:last-child { border-bottom:0; }
    .results-box .breakdown { font-weight:400; font-size:0.95rem; margin-top:0.5rem; color:#222; }
    .results-box .breakdown div { margin:0.25rem 0; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a class="logo" href="/">nicodimaano.com</a>
      <ul class="nav-links">
        <li><a href="/tools/tools.html">Tools</a></li>
        <li><a href="/diary/diary.html">Diary</a></li>
        <li><a href="/SupportMe/SupportMe.html">Support Me</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="container calculator">
      <h1>Ski Resort Trip Planner</h1>
      <p class="muted">Utility Tool to help you get to your ski resort.</p>

      <div class="input-row">
        <div class="col">
          <label for="airport"><strong>Airport</strong></label>
          <input id="airport" class="airport-input" type="text" list="airport-options" autocomplete="off" placeholder="Enter your Airport">
          <datalist id="airport-options"></datalist>
        </div>

        to

        <div class="col">
          <label for="resort"><strong>Ski Resort</strong></label>
          <input id="resort" class="resort-input" type="text" list="resort-options" autocomplete="off" placeholder="Enter Ski Resort">
          <datalist id="resort-options"></datalist>
        </div>
      </div>

      <button id="calculate" class="calc-btn">Calculate</button>

      <div id="results-box" class="results-box" aria-live="polite">
        <ol id="results-list"></ol>
      </div>
    </section>
  </main>

  <script src="../assets/airports-data.js"></script>
  <script src="../assets/ski-resorts-data.js"></script>
  <script>
    function formatAirportOption(airport) {
      var pieces = [airport.iata, airport.name].filter(Boolean);
      if (airport.city) {
        pieces.push(airport.city);
      }
      return pieces.join(' - ');
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, function(m) {
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];
      });
    }

    var airportCatalog = Object.keys(window.AIRPORT_DATA || {}).map(function(key) {
      return window.AIRPORT_DATA[key];
    }).filter(function(airport) {
      return airport && airport.iata && airport.iata.length === 3;
    }).sort(function(left, right) {
      return left.iata.localeCompare(right.iata);
    });

    function airportScore(airport, query) {
      if (!query) {
        return 4;
      }

      if (airport.iata.toLowerCase().indexOf(query) === 0) {
        return 0;
      }

      if (airport.name.toLowerCase().indexOf(query) === 0) {
        return 1;
      }

      if (airport.city && airport.city.toLowerCase().indexOf(query) === 0) {
        return 2;
      }

      return 3;
    }

    function renderAirportOptions(query) {
      var list = document.getElementById('airport-options');
      var normalizedQuery = query.trim().toLowerCase();
      var matches = airportCatalog.filter(function(airport) {
        if (!normalizedQuery) {
          return true;
        }

        return airport.iata.toLowerCase().indexOf(normalizedQuery) === 0 ||
          airport.name.toLowerCase().indexOf(normalizedQuery) !== -1 ||
          (airport.city && airport.city.toLowerCase().indexOf(normalizedQuery) !== -1);
      }).sort(function(left, right) {
        var leftScore = airportScore(left, normalizedQuery);
        var rightScore = airportScore(right, normalizedQuery);

        if (leftScore !== rightScore) {
          return leftScore - rightScore;
        }

        return left.iata.localeCompare(right.iata);
      }).slice(0, 12);

      list.innerHTML = '';

      matches.forEach(function(airport) {
        var option = document.createElement('option');
        option.value = formatAirportOption(airport);
        list.appendChild(option);
      });
    }

    var airportInput = document.getElementById('airport');
    airportInput.addEventListener('input', function() {
      renderAirportOptions(airportInput.value);
    });

    renderAirportOptions('');

    /* --- Ski resort picker --- */
    function formatResortOption(resort) {
      var pieces = [resort.name, resort.location || resort.country].filter(Boolean);
      return pieces.join(' - ');
    }

    var resortCatalog = (window.SKI_RESORTS || []).slice();

    function resortScore(resort, query) {
      if (!query) return 4;
      if (resort.name.toLowerCase().indexOf(query) === 0) return 0;
      if (resort.location && resort.location.toLowerCase().indexOf(query) === 0) return 1;
      if (resort.country && resort.country.toLowerCase().indexOf(query) === 0) return 2;
      return 3;
    }

    function renderResortOptions(query) {
      var list = document.getElementById('resort-options');
      var normalizedQuery = query.trim().toLowerCase();
      var matches = resortCatalog.filter(function(r) {
        if (!normalizedQuery) return true;
        return r.name.toLowerCase().indexOf(normalizedQuery) !== -1 ||
               (r.location && r.location.toLowerCase().indexOf(normalizedQuery) !== -1) ||
               (r.country && r.country.toLowerCase().indexOf(normalizedQuery) !== -1);
      }).sort(function(a, b) {
        var sa = resortScore(a, normalizedQuery), sb = resortScore(b, normalizedQuery);
        if (sa !== sb) return sa - sb;
        return a.name.localeCompare(b.name);
      }).slice(0, 20);

      list.innerHTML = '';
      matches.forEach(function(r) {
        var option = document.createElement('option');
        option.value = formatResortOption(r);
        list.appendChild(option);
      });

    }

    var resortInput = document.getElementById('resort');
    resortInput.addEventListener('input', function() { renderResortOptions(resortInput.value); });
    renderResortOptions('');

    // cookie helpers
    function setCookie(name, value, days) {
      var d = new Date();
      d.setTime(d.getTime() + (days*24*60*60*1000));
      var expires = "expires=" + d.toUTCString();
      document.cookie = name + "=" + encodeURIComponent(value) + ";" + expires + ";path=/";
    }

    function getCookie(name) {
      var cname = name + "=";
      var decoded = decodeURIComponent(document.cookie || "");
      var parts = decoded.split(';');
      for (var i = 0; i < parts.length; i++) {
        var c = parts[i].trim();
        if (c.indexOf(cname) === 0) return c.substring(cname.length, c.length);
      }
      return null;
    }

    function formatAndShowResult(airportRaw, resortRaw, liftRaw) {
      if (!airportRaw || !resortRaw) return;
      var list = document.getElementById('results-list');

      // extract airport IATA (e.g. YEG) from common formats
      var airportCode = '';
      var m = airportRaw.match(/^([A-Za-z]{3})\b/);
      if (m) {
        airportCode = m[1].toUpperCase();
      } else {
        m = airportRaw.match(/\(([A-Za-z]{3})\)/);
        if (m) airportCode = m[1].toUpperCase();
        else {
          var parts = airportRaw.split(' - ');
          airportCode = (parts[0] || airportRaw).toUpperCase();
        }
      }

      // extract resort name (before the first ' - ')
      var resortName = resortRaw.split(' - ')[0].trim();

      // try to find resort in catalog to get nearestIntlAirport
      var match = resortCatalog.find(function(s) {
        return s && s.name && s.name.toLowerCase() === resortName.toLowerCase();
      });
      if (!match) {
        match = resortCatalog.find(function(s) {
          return s && s.name && s.name.toLowerCase().indexOf(resortName.toLowerCase()) !== -1;
        });
      }

      var nearest = (match && match.nearestIntlAirport) ? match.nearestIntlAirport : '';

      // attempt to extract airport code for the nearest international airport (e.g. "Calgary International (YYC)")
      var nearestCodeMatch = (nearest || '').match(/\(([A-Za-z]{3})\)/);
      var nearestCode = nearestCodeMatch ? nearestCodeMatch[1].toUpperCase() : '';

      // determine lift price: prefer catalog value, fall back to provided liftRaw
      var liftPriceVal = null;
      if (match && typeof match.liftPrice !== 'undefined' && match.liftPrice !== null) {
        liftPriceVal = Number(match.liftPrice);
      } else if (typeof liftRaw !== 'undefined' && liftRaw !== null && liftRaw !== '') {
        var tmp = Number(liftRaw);
        if (!isNaN(tmp)) liftPriceVal = tmp;
      }

      var priceDisplay = '';
      if (liftPriceVal !== null && !isNaN(liftPriceVal)) priceDisplay = ' — Lift ticket: $' + liftPriceVal.toFixed(2);

      var mainLine = airportCode + ' ✈️ → ' + (nearest || '—') + ' ✈️ → ' + (match ? match.name : resortName) + ' ⛷️';

      // breakdown (placeholders for flight legs; actual computation can be added later)
      var leg1 = airportCode + ' ✈️ → ' + (nearestCode || '—') + ' ✈️ = $<placeholder>';
      var leg2 = (nearestCode || '—') + ' ✈️ → ' + (match ? match.name : resortName) + ' ⛷️= $<placeholder>';
      var liftLine = (match ? match.name : resortName) + ' ⛷️= ' + (liftPriceVal !== null ? ('$' + liftPriceVal.toFixed(2)) : '$<placeholder>');

      var html = '<strong>' + escapeHtml(mainLine) + '</strong>' +
        '<div class="breakdown"><div><strong>Cost Break down:</strong></div>' +
        '<div>' + escapeHtml(leg1) + '</div>' +
        '<div>' + escapeHtml(leg2) + '</div>' +
        '<div>' + escapeHtml(liftLine) + '</div>' +
        '</div>';

      // update only the first result row (use innerHTML to preserve line structure)
      var first = list.querySelector('li');
      if (first) first.innerHTML = html;
      else {
        var li = document.createElement('li');
        li.innerHTML = html;
        list.appendChild(li);
      }
    }

    // load saved values from cookies
    (function loadSaved() {
      var savedAirport = getCookie('lastAirportCode');
      var savedResort = getCookie('lastResort');
      var savedLift = getCookie('lastLiftPrice');
      if (savedAirport) {
        // set airport input to saved code (user wanted code remembered)
        document.getElementById('airport').value = savedAirport;
      }
      if (savedResort) {
        document.getElementById('resort').value = savedResort;
      }
      if (savedLift) {
        document.getElementById('lift-price').value = savedLift;
      }
      // if both exist, show the last result
      if (savedAirport && savedResort) {
        formatAndShowResult(savedAirport, savedResort, savedLift);
      }
    })();

    document.getElementById('calculate').addEventListener('click', function(){
      var a = document.getElementById('airport').value.trim();
      var r = document.getElementById('resort').value.trim();
      if (!a || !r) {
        alert('Please enter both airport and resort name.');
        return;
      }

      // compute airport code as displayed
      var airportCode = '';
      var m = a.match(/^([A-Za-z]{3})\b/);
      if (m) airportCode = m[1].toUpperCase();
      else {
        m = a.match(/\(([A-Za-z]{3})\)/);
        if (m) airportCode = m[1].toUpperCase();
        else {
          var parts = a.split(' - ');
          airportCode = (parts[0] || a).toUpperCase();
        }
      }

      var lift = document.getElementById('lift-price').value.trim();
      // save cookies
      setCookie('lastAirportCode', airportCode, 365);
      setCookie('lastResort', r, 365);
      setCookie('lastLiftPrice', lift, 365);

      // update the single result row
      formatAndShowResult(airportCode, r, lift);
      document.getElementById('airport').focus();
    });
  </script>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 nicodimaano.com</p>
    </div>
  </footer>
</body>
</html>
