<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Deadlock Calculator — nicodimaano.com</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="site-header-placeholder"></div>

  <main>
    <section class="hero container">
      <h1 class="name">Deadlock Calculator</h1>
      <p class="bio">Placeholder page for the deadlock calculator. I'll add the interactive tool next.</p>
    </section>

    <section class="container">
      <p class="muted">Coming soon — calculator and visualization.</p>
    </section>
  </main>

  <div id="site-footer-placeholder"></div>
  <script>
    (function(){
      const path = location.pathname.replace(/\/+$/,'') || '/';
      document.querySelectorAll('.nav-links a').forEach(a=>{
        try{
          const href = new URL(a.href).pathname.replace(/\/+$/,'') || '/';
          if(path === href || path.startsWith(href)) a.classList.add('active');
        }catch(e){}
      });
    })();
  </script>
  <script>
    (function(){
      // bind submenu behavior only for list items that actually contain a .submenu
      document.querySelectorAll('.nav-links li').forEach(li=>{
        const submenu = li.querySelector('.submenu');
        if(!submenu) return;
        const a = li.querySelector('a');
        if(!a) return;
        a.setAttribute('aria-haspopup','true');
        a.setAttribute('aria-expanded','false');
        a.addEventListener('click', function(e){
          const isOpen = li.classList.contains('open');
          if(!isOpen){
            li.classList.add('open');
            a.setAttribute('aria-expanded','true');
            e.preventDefault();
          }
        });
      });
      document.addEventListener('click', function(e){
        if(!e.target.closest('.nav-links')){
          document.querySelectorAll('.nav-links li.open').forEach(li=>{
            li.classList.remove('open');
            const link = li.querySelector('a'); if(link) link.setAttribute('aria-expanded','false');
          });
        }
      });
      document.addEventListener('keydown', function(e){
        if(e.key === 'Escape'){
          document.querySelectorAll('.nav-links li.open').forEach(li=>{
            li.classList.remove('open');
            const link = li.querySelector('a'); if(link) link.setAttribute('aria-expanded','false');
          });
        }
      });
    })();
  </script>
  <script src="/includes/loader.js"></script>
</body>
</html>
