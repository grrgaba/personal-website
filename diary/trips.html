<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Trips — Diary — nicodimaano.com</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a class="logo" href="/">nicodimaano.com</a>
      <ul class="nav-links">
        <li><a href="/tools/">Tools</a></li>
        <li class="has-sub">
          <a href="/diary/">Diary</a>
          <ul class="submenu">
            <li><a href="/diary/trips.html">Trips</a></li>
            <li><a href="/diary/expedition.html">Expedition</a></li>
            <li><a href="/diary/gaming.html">GAMING</a></li>
          </ul>
        </li>
        <li><a href="/store/">Support Me</a></li>
      </ul>
      <a class="donate" href="https://www.paypal.com/paypalme/NicoDimaanoAB" target="_blank" rel="noopener noreferrer">Donate</a>
    </nav>
  </header>

  <main>
    <section class="hero container">
      <h1 class="name">Trips</h1>
      <p class="bio">Travel logs and short trip notes.</p>
    </section>

    <section class="container">
      <div class="grid">
        <p class="muted">No trip entries yet.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 nicodimaano.com</p>
    </div>
  </footer>
  <script>
    (function(){
      const path = location.pathname.replace(/\/+$/,'') || '/';
      document.querySelectorAll('.nav-links a').forEach(a=>{
        try{ const href = new URL(a.href).pathname.replace(/\/+$/,'')|| '/'; if(path===href||path.startsWith(href)) a.classList.add('active')}catch(e){}
      });
    })();
  </script>
  <script>
    (function(){
      const subLinks = document.querySelectorAll('.nav-links li.has-sub > a');
      subLinks.forEach(a=>{
        a.setAttribute('aria-haspopup','true');
        a.setAttribute('aria-expanded','false');
        a.addEventListener('click', function(e){
          const li = a.parentElement;
          const isOpen = li.classList.contains('open');
          if(!isOpen){
            li.classList.add('open');
            a.setAttribute('aria-expanded','true');
            e.preventDefault();
          }
        });
      });
      document.addEventListener('click', function(e){
        if(!e.target.closest('.nav-links')){
          document.querySelectorAll('.nav-links li.has-sub.open').forEach(li=>{
            li.classList.remove('open');
            const link = li.querySelector('a'); if(link) link.setAttribute('aria-expanded','false');
          });
        }
      });
      document.addEventListener('keydown', function(e){
        if(e.key === 'Escape'){
          document.querySelectorAll('.nav-links li.has-sub.open').forEach(li=>{
            li.classList.remove('open');
            const link = li.querySelector('a'); if(link) link.setAttribute('aria-expanded','false');
          });
        }
      });
    })();
  </script>
</body>
</html>
