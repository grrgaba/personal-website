<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Store — Support Me — nicodimaano.com</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
</head>
<body>
  <div id="site-header-placeholder"></div>

  <main>
    <section class="hero container">
      <h1 class="name">Store</h1>
      <p class="bio">Simple store — small items and samples.</p>
    </section>

    <section class="container">
      <div class="grid">
        <div class="card">
          <h3>Thank you letter</h3>
          <p class="muted">Personal thank-you letter sent via email.</p>
          <p><strong>Price:</strong> $5</p>
        </div>

        <div class="card">
          <h3>3D printed letter N</h3>
          <p class="muted">Small 3D printed letter — 'N'.</p>
          <p><strong>Price:</strong> $5</p>
        </div>

        <div class="card">
          <h3>3D printed letter O</h3>
          <p class="muted">Small 3D printed letter — 'O'.</p>
          <p><strong>Price:</strong> $5</p>
        </div>

        <div class="card">
          <h3>Sample</h3>
          <p class="muted">Free sample / preview item.</p>
          <p><strong>Price:</strong> Free</p>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer-placeholder"></div>
  <script src="/includes/loader.js"></script>
</body>
</html>
